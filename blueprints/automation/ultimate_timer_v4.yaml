blueprint:
  name: Ultimate Timer V4 (HH+MM FINAL)
  description: >
    Timer Blueprint mit Stunden + Minuten Eingabe.

    ✔ Kein !input Fehler mehr
    ✔ Stabil mit input_number
    ✔ Countdown kompatibel
    ✔ Multi-instance safe

  domain: automation

  input:
    start_entity:
      name: Start Trigger
      selector:
        entity:

    stop_entity:
      name: Stop Trigger (optional)
      default: []
      selector:
        entity:

    running_entity:
      name: Running State
      selector:
        entity:
          domain: input_boolean

    done_entity:
      name: Done State
      selector:
        entity:
          domain: input_boolean

    start_time_helper:
      name: Start Time Helper
      selector:
        entity:
          domain: input_datetime

    duration_helper:
      name: Duration Helper (seconds)
      selector:
        entity:
          domain: input_number

    duration_hours:
      name: Stunden (HH)
      selector:
        entity:
          domain: input_number

    duration_minutes:
      name: Minuten (MM)
      selector:
        entity:
          domain: input_number

mode: parallel
max: 10

##################################
# 🔥 WICHTIG: INPUT FIX
##################################

variables:
  duration_hours_entity: !input duration_hours
  duration_minutes_entity: !input duration_minutes
  stop_entity_var: !input stop_entity

##################################

trigger:
  - id: start
    platform: state
    entity_id: !input start_entity
    to: "on"

  - id: stop
    platform: state
    entity_id: !input stop_entity
    to: "on"

condition: []

action:
  - choose:

      ##################################
      # ⏹ STOP
      ##################################
      - conditions:
          - condition: trigger
            id: stop
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input running_entity

          - service: input_boolean.turn_off
            target:
              entity_id: !input stop_entity

      ##################################
      # ▶ START
      ##################################
      - conditions:
          - condition: trigger
            id: start
        sequence:

          - delay: "00:00:01"

          - service: input_boolean.turn_off
            target:
              entity_id: !input start_entity

          ##################################
          # ❗ Nur starten wenn Zeit > 0
          ##################################
          - condition: template
            value_template: >
              {{ (states(duration_hours_entity)|int +
                  states(duration_minutes_entity)|int) > 0 }}

          - service: input_boolean.turn_on
            target:
              entity_id: !input running_entity

          - service: input_boolean.turn_off
            target:
              entity_id: !input done_entity

          ##################################
          # 🧠 Startzeit
          ##################################
          - service: input_datetime.set_datetime
            target:
              entity_id: !input start_time_helper
            data:
              time: "{{ now().strftime('%H:%M:%S') }}"

          ##################################
          # 🔥 Dauer berechnen
          ##################################
          - variables:
              duration_seconds: >
                {{ (states(duration_hours_entity) | int * 3600) +
                   (states(duration_minutes_entity) | int * 60) }}

          - service: input_number.set_value
            target:
              entity_id: !input duration_helper
            data:
              value: "{{ duration_seconds }}"

          ##################################
          # ⏳ WAIT
          ##################################
          - if:
              - condition: template
                value_template: "{{ stop_entity_var != [] }}"
            then:
              - wait_for_trigger:
                  - platform: state
                    entity_id: !input stop_entity
                    to: "on"
                timeout:
                  seconds: "{{ duration_seconds }}"
                continue_on_timeout: true
            else:
              - delay:
                  seconds: "{{ duration_seconds }}"

          ##################################
          # 🔚 AUSWERTUNG
          ##################################
          - choose:

              # STOP gedrückt
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none }}"
                sequence:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input running_entity

                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input stop_entity

              # TIMER fertig
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is none }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input done_entity

                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input running_entity
