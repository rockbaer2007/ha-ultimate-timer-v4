blueprint:
  name: Ultimate Timer V4 (Countdown + Stable Core)
  description: >
    Advanced hybrid timer blueprint with integrated countdown support.

    ✔ Based on proven V3 stable logic
    ✔ Countdown support via helpers
    ✔ Reliable STOP handling
    ✔ DONE stays ON until reset
    ✔ Multi-instance safe

  domain: automation

  input:
    start_entity:
      name: Start Trigger
      selector:
        entity:

    stop_entity:
      name: Stop Trigger (optional)
      default: []
      selector:
        entity:

    running_entity:
      name: Running State
      selector:
        entity:
          domain: input_boolean

    done_entity:
      name: Done State
      selector:
        entity:
          domain: input_boolean

    start_time_helper:
      name: Start Time Helper
      selector:
        entity:
          domain: input_datetime

    duration_helper:
      name: Duration Helper (seconds)
      selector:
        entity:
          domain: input_number

    duration:
      name: Duration (hh:mm:ss)
      default: "00:05:00"
      selector:
        text: {}

    reset_time:
      name: Reset Time (hh:mm:ss)
      default: ""
      selector:
        text: {}

mode: parallel
max: 10

variables:
  reset_time_final: >
    {{ reset_time if reset_time|length > 0 else "00:01:00" }}

trigger:
  - id: start
    platform: state
    entity_id: !input start_entity
    to: "on"

  - id: stop
    platform: state
    entity_id: !input stop_entity
    to: "on"

  - id: reset
    platform: template
    value_template: >
      {{ now().strftime('%H:%M:%S') == reset_time_final }}

condition: []

action:
  - choose:

      # 🌙 RESET
      - conditions:
          - condition: trigger
            id: reset
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id:
                - !input running_entity
                - !input done_entity

      # ⏹️ STOP
      - conditions:
          - condition: trigger
            id: stop
        sequence:
          - service: input_boolean.turn_off
            target:
              entity_id: !input running_entity

          - service: input_boolean.turn_off
            target:
              entity_id: !input stop_entity

      # ▶️ START
      - conditions:
          - condition: trigger
            id: start
        sequence:

          # Taster Reset
          - delay: "00:00:01"
          - service: input_boolean.turn_off
            target:
              entity_id: !input start_entity

          # Status setzen
          - service: input_boolean.turn_on
            target:
              entity_id: !input running_entity

          - service: input_boolean.turn_off
            target:
              entity_id: !input done_entity

          # 🧠 Countdown Daten speichern
          - service: input_datetime.set_datetime
            target:
              entity_id: !input start_time_helper
            data:
              time: "{{ now().strftime('%H:%M:%S') }}"

          - service: input_number.set_value
            target:
              entity_id: !input duration_helper
            data:
              value: >
                {% set h,m,s = duration.split(':') %}
                {{ h|int*3600 + m|int*60 + s|int }}

          # Warten
          - if:
              - condition: template
                value_template: "{{ stop_entity != [] }}"
            then:
              - wait_for_trigger:
                  - platform: state
                    entity_id: !input stop_entity
                    to: "on"
                timeout: !input duration
                continue_on_timeout: true
            else:
              - delay: !input duration

          # Entscheidung
          - choose:

              # STOP gedrückt
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is not none }}"
                sequence:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input running_entity

                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input stop_entity

              # TIMER fertig
              - conditions:
                  - condition: template
                    value_template: "{{ wait.trigger is none }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input done_entity

                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input running_entity
